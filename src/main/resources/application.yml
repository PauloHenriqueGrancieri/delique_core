server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/delique_db}
    username: ${SPRING_DATASOURCE_USERNAME:delique_user}
    password: ${SPRING_DATASOURCE_PASSWORD:delique_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

logging:
  level:
    com.delique: INFO
    org.springframework: WARN
    org.hibernate: WARN

app:
  product-images-dir: ${PRODUCT_IMAGES_DIR:./product-images}
  restore-on-startup: ${RESTORE_ON_STARTUP:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
